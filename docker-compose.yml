services:
  postgres:
    image: postgres:16-alpine
    container_name: event_ops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: event_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d event_ops']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: event_ops_backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: event_ops_frontend
    restart: unless-stopped
    env_file:
      - ./apps/frontend/.env.docker
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  postgres_data:
